<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuttle Leaderboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f8f7f4;
    --surface:   #ffffff;
    --border:    #e2e0d8;
    --text:      #1a1a18;
    --muted:     #6b6a65;
    --accent:    #1d9e75;
    --accent-bg: #e1f5ee;
    --solved:    #1d9e75;
    --unsolved:  #d3d1c7;
    --radius:    8px;
    --shadow:    0 1px 3px rgba(0,0,0,0.07);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #1c1c1a;
      --surface:   #242422;
      --border:    #3a3a38;
      --text:      #e8e6de;
      --muted:     #888780;
      --accent:    #1d9e75;
      --accent-bg: #04342c;
      --solved:    #5dcaa5;
      --unsolved:  #3a3a38;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding: 24px 16px 48px;
  }

  header {
    max-width: 960px;
    margin: 0 auto 28px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  header p {
    color: var(--muted);
    font-size: 13px;
  }

  #status {
    display: inline-block;
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  #status.error { color: #e24b4a; }

  .card {
    max-width: 960px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    white-space: nowrap;
  }

  thead th {
    padding: 10px 14px;
    text-align: left;
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1;
  }

  thead th.prob-header {
    text-align: center;
    max-width: 80px;
    white-space: normal;
    word-break: break-word;
    line-height: 1.3;
    vertical-align: bottom;
    padding-bottom: 8px;
  }

  thead th.rank-col { width: 40px; text-align: center; }
  thead th.user-col { min-width: 120px; }
  thead th.count-col { width: 60px; text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--accent-bg); }

  tbody td {
    padding: 9px 14px;
    vertical-align: middle;
  }

  td.rank {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }

  td.username {
    font-weight: 500;
  }

  td.count {
    text-align: center;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  td.cell {
    text-align: center;
  }

  .dot-solved {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--solved);
    vertical-align: middle;
    title: "Solved";
  }

  .dot-unsolved {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--unsolved);
    vertical-align: middle;
    opacity: 0.45;
  }

  .tooltip-wrap {
    position: relative;
    display: inline-block;
  }

  .tooltip-wrap .tip {
    visibility: hidden;
    opacity: 0;
    position: absolute;
    bottom: 130%;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a18;
    color: #f0ede6;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    white-space: nowrap;
    pointer-events: none;
    transition: opacity 0.12s;
    z-index: 10;
  }

  .tooltip-wrap:hover .tip {
    visibility: visible;
    opacity: 1;
  }

  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
  }

  .controls {
    max-width: 960px;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .controls input[type="text"] {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    outline: none;
    width: 200px;
  }

  .controls input[type="text"]:focus {
    border-color: var(--accent);
  }

  .controls label {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    .controls input[type="text"] { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Leaderboard</h1>
  <p>Full-score solves per problem</p>
  <span id="status">Loading…</span>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search user…" oninput="render()">
  <label>
    <input type="checkbox" id="hide-zero" onchange="render()">
    Hide users with 0 solves
  </label>
</div>

<div class="card">
  <div class="table-wrap">
    <div id="table-container">
      <div class="empty-state">Loading leaderboard data…</div>
    </div>
  </div>
</div>

<script>
let DATA = null;

async function load() {
  try {
    const r = await fetch("data.json?" + Date.now());
    if (!r.ok) throw new Error("HTTP " + r.status);
    DATA = await r.json();
    const d = new Date(DATA.updated);
    document.getElementById("status").textContent =
      "Last updated: " + d.toLocaleString();
    render();
  } catch (e) {
    const s = document.getElementById("status");
    s.textContent = "Failed to load data: " + e.message;
    s.className = "error";
    document.getElementById("table-container").innerHTML =
      '<div class="empty-state">Could not load leaderboard data.</div>';
  }
}

function render() {
  if (!DATA) return;

  const search   = document.getElementById("search").value.trim().toLowerCase();
  const hideZero = document.getElementById("hide-zero").checked;

  const problems = DATA.problems;
  const users    = DATA.users;

  // Build sorted user list: descending by solve count, then alphabetical
  let rows = Object.entries(users).map(([username, solves]) => {
    const count = problems.filter(p => solves[p] != null).length;
    return { username, solves, count };
  });

  if (search)   rows = rows.filter(r => r.username.toLowerCase().includes(search));
  if (hideZero) rows = rows.filter(r => r.count > 0);

  rows.sort((a, b) => b.count - a.count || a.username.localeCompare(b.username));

  if (rows.length === 0) {
    document.getElementById("table-container").innerHTML =
      '<div class="empty-state">No users match the current filters.</div>';
    return;
  }

  let html = "<table>";

  // Header row
  html += "<thead><tr>";
  html += '<th class="rank-col">#</th>';
  html += '<th class="user-col">User</th>';
  html += '<th class="count-col">Solved</th>';
  for (const prob of problems) {
    const short = prob.length > 14 ? prob.slice(0, 13) + "…" : prob;
    html += `<th class="prob-header" title="${esc(prob)}">${esc(short)}</th>`;
  }
  html += "</tr></thead>";

  // Body rows
  html += "<tbody>";
  let rank = 1, prevCount = -1, displayRank = 1;
  for (const row of rows) {
    if (row.count !== prevCount) { displayRank = rank; }
    prevCount = row.count;

    html += "<tr>";
    html += `<td class="rank">${displayRank}</td>`;
    html += `<td class="username">${esc(row.username)}</td>`;
    html += `<td class="count">${row.count} / ${problems.length}</td>`;

    for (const prob of problems) {
      const date = row.solves[prob];
      if (date) {
        html += `<td class="cell"><span class="tooltip-wrap">` +
          `<span class="dot-solved"></span>` +
          `<span class="tip">${esc(prob)}<br>${esc(date)}</span>` +
          `</span></td>`;
      } else {
        html += `<td class="cell"><span class="tooltip-wrap">` +
          `<span class="dot-unsolved"></span>` +
          `<span class="tip">${esc(prob)}<br>Not solved</span>` +
          `</span></td>`;
      }
    }

    html += "</tr>";
    rank++;
  }

  html += "</tbody></table>";
  document.getElementById("table-container").innerHTML = html;
}

function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

load();
// Auto-refresh every 5 minutes so the page stays live if left open
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
