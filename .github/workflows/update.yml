name: Update leaderboard

on:
  schedule:
    - cron: "*/300 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch submissions and update data.json
        env:
          CONTEST_ID:       ${{ secrets.CONTEST_ID }}
          CUTTLE_SESSION:   ${{ secrets.CUTTLE_SESSION }}
          CUTTLE_PHPSESSID: ${{ secrets.CUTTLE_PHPSESSID }}
          CUTTLE_STATUS:    ${{ secrets.CUTTLE_STATUS }}
        # run: python egoi-leaderboard/fetch_submissions.py
        run: cd egoi-leaderboard && python fetch_submissions.py

      - name: Commit and push data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update leaderboard data [skip ci]"
          git push
